<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShoBBS Future</title>
    <style>
        :root { 
            --bg: #020617; 
            --card: rgba(15, 23, 42, 0.9); 
            --accent: #00f2ff; 
            --text: #e2e8f0; 
            --border: #1e293b;
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            width: 100%; 
            max-width: 800px; 
            background: var(--card); 
            border: 1px solid var(--accent); 
            min-height: 95vh; 
            padding: 20px; 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            box-sizing: border-box;
        }
        h1 { 
            text-align: center; 
            color: var(--accent); 
            letter-spacing: 4px; 
            text-transform: uppercase;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        /* スレッド一覧 */
        .thread-item { 
            padding: 15px; 
            border: 1px solid var(--border); 
            margin-bottom: 10px; 
            cursor: pointer; 
            transition: 0.3s;
            background: rgba(255,255,255,0.02);
        }
        .thread-item:hover { 
            border-color: var(--accent); 
            background: rgba(0, 242, 255, 0.05); 
        }
        .thread-title { color: var(--accent); font-weight: bold; }

        /* フォーム */
        .form-area { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--accent); 
            padding: 15px; 
            margin: 20px 0; 
        }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            background: #000; 
            color: var(--accent); 
            border: 1px solid var(--border); 
            box-sizing: border-box;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: transparent; 
            color: var(--accent); 
            border: 1px solid var(--accent); 
            font-weight: bold; 
            cursor: pointer; 
        }
        button:hover { background: var(--accent); color: #000; }

        /* レス表示 */
        .post { 
            border-left: 3px solid var(--accent); 
            padding: 10px 15px; 
            margin-bottom: 15px; 
            background: rgba(255,255,255,0.03);
        }
        .post-info { color: var(--accent); font-size: 0.8em; margin-bottom: 5px; opacity: 0.8; }
        .post-body { line-height: 1.6; }

        .nav { display: flex; justify-content: space-between; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="root" class="container"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    let currentUserName = "";
    let currentThreadId = null;
    let db;

    const firebaseConfig = {
        apiKey: "AIzaSyD2-XU5R6upCUgSDJbDz7iSoEQCzrzusLk",
        authDomain: "t1s-sns.firebaseapp.com",
        projectId: "t1s-sns",
        storageBucket: "t1s-sns.appspot.com",
        messagingSenderId: "377338728077",
        appId: "1:377338728077:web:1205ed292e4181869adcc4"
    };

    window.onload = () => {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        showLoginPage();
    };

    function showLoginPage() {
        document.getElementById('root').innerHTML = `
            <h1>ShoBBS Access</h1>
            <input type="text" id="loginId" placeholder="USER ID">
            <input type="password" id="pinCode" placeholder="PIN CODE">
            <button onclick="login()">LOGIN</button>
            <div style="text-align:center; margin-top:20px; font-size:0.8em; opacity:0.6;">
                NEW ACCESS REQUEST? <br>
                <input type="text" id="regId" placeholder="NEW ID">
                <input type="password" id="regPin" placeholder="NEW PIN">
                <button onclick="register()">REQUEST</button>
            </div>
        `;
    }

    async function login() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('pinCode').value;
        const snap = await db.collection("requests").where("userId", "==", id).get();
        if (snap.empty) return alert("NO DATA");
        const data = snap.docs[0].data();
        if (data.pin == pin && data.isApproved) {
            currentUserName = id;
            showThreadList();
        } else { alert("DENIED"); }
    }

    async function register() {
        const id = document.getElementById('regId').value;
        const pin = document.getElementById('regPin').value;
        if(!id || !pin) return;
        await db.collection("requests").add({ userId: id, pin: pin, isApproved: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("REQUEST SENT");
    }

    function showThreadList() {
        currentThreadId = null;
        document.getElementById('root').innerHTML = `
            <div class="nav"><button style="width:auto" onclick="location.reload()">LOGOUT</button></div>
            <h1>Threads</h1>
            <div class="form-area">
                <input type="text" id="newThreadTitle" placeholder="THREAD TITLE">
                <textarea id="firstPost" placeholder="MESSAGE"></textarea>
                <button onclick="createThread()">CREATE THREAD</button>
            </div>
            <div id="list-area">SYNCING...</div>
        `;
        
        db.collection("threads").orderBy("createdAt", "desc").onSnapshot(ss => {
            const area = document.getElementById('list-area');
            if(!area || currentThreadId) return;
            area.innerHTML = "";
            ss.forEach(doc => {
                const t = doc.data();
                area.innerHTML += `
                    <div class="thread-item" onclick="showThreadDetail('${doc.id}', '${t.title.replace(/'/g, "\\'")}')">
                        <div class="thread-title">■ ${t.title}</div>
                        <div style="font-size:0.7em; opacity:0.5; margin-top:5px;">BY: ${t.creator}</div>
                    </div>`;
            });
        });
    }

    async function createThread() {
        const title = document.getElementById('newThreadTitle').value;
        const text = document.getElementById('firstPost').value;
        if(!title || !text) return;
        const threadRef = await db.collection("threads").add({
            title: title, creator: currentUserName, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await db.collection("posts").add({
            threadId: threadRef.id, user: currentUserName, text: text, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showThreadDetail(threadRef.id, title);
    }

    function showThreadDetail(id, title) {
        currentThreadId = id;
        document.getElementById('root').innerHTML = `
            <div class="nav"><button style="width:auto" onclick="showThreadList()">BACK</button></div>
            <h1>${title}</h1>
            <div class="form-area">
                <textarea id="replyText" rows="3" placeholder="REPLY..."></textarea>
                <button onclick="sendReply()">SEND</button>
            </div>
            <div id="post-area"></div>
        `;

        // データを取得してからJavaScript側で逆順にする（インデックスエラー回避のため）
        db.collection("posts").where("threadId", "==", id).onSnapshot(ss => {
            const area = document.getElementById('post-area');
            if(!area) return;
            
            // データを配列に格納
            let posts = [];
            ss.forEach(doc => {
                posts.push(doc.data());
            });

            // 日付順にソート（新しい順）
            posts.sort((a, b) => {
                const timeA = a.createdAt ? a.createdAt.toMillis() : Date.now();
                const timeB = b.createdAt ? b.createdAt.toMillis() : Date.now();
                return timeB - timeA;
            });

            area.innerHTML = "";
            posts.forEach((p, index) => {
                const num = posts.length - index;
                area.innerHTML += `
                    <div class="post">
                        <div class="post-info">ID: ${p.user}</div>
                        <div class="post-body">${p.text}</div>
                    </div>`;
            });
        });
    }

    async function sendReply() {
        const text = document.getElementById('replyText').value;
        if(!text.trim()) return;
        await db.collection("posts").add({
            threadId: currentThreadId, user: currentUserName, text: text, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('replyText').value = "";
    }
</script>
</body>
</html>
