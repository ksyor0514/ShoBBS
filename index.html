<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShoBBS 2.0</title>
    <style>
        :root { --bg: #efefef; --w-bg: #fff; --border: #ccc; --link: #0000ff; }
        body { background: var(--bg); font-family: "MS PGothic", sans-serif; padding: 10px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: var(--w-bg); border: 2px solid var(--border); min-height: 100vh; padding: 15px; }
        h1 { color: #f00; text-align: center; font-size: 1.4em; }
        
        /* スレッド一覧 */
        .thread-item { padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer; color: var(--link); }
        .thread-item:hover { background: #f9f9f9; text-decoration: underline; }
        
        /* 書き込み/スレ立てフォーム */
        .form-area { background: #f0f0f0; border: 1px solid var(--border); padding: 15px; margin: 20px 0; }
        input, textarea { width: 100%; box-sizing: border-box; margin-bottom: 5px; }
        
        /* レス表示 */
        .post { border-bottom: 1px dashed var(--border); padding: 10px 0; }
        .post-info { color: #228b22; font-size: 0.9em; font-weight: bold; }
        .post-body { margin-top: 5px; white-space: pre-wrap; }
        
        .nav-bar { margin-bottom: 10px; }
        .btn { background: #eee; border: 1px solid #999; cursor: pointer; padding: 3px 10px; }
    </style>
</head>
<body>

<div id="root" class="container">
    </div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    let currentUserName = "";
    let currentThreadId = null; // どのスレッドを見ているか
    let db;

    const firebaseConfig = {
        apiKey: "AIzaSyD2-XU5R6upCUgSDJbDz7iSoEQCzrzusLk",
        authDomain: "t1s-sns.firebaseapp.com",
        projectId: "t1s-sns",
        storageBucket: "t1s-sns.appspot.com",
        messagingSenderId: "377338728077",
        appId: "1:377338728077:web:1205ed292e4181869adcc4"
    };

    window.onload = () => {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        showLoginPage();
    };

    // --- ログイン/登録画面 ---
    function showLoginPage() {
        document.getElementById('root').innerHTML = `
            <h1>ShoBBS - ログイン</h1>
            <input type="text" id="loginId" placeholder="ID">
            <input type="password" id="pinCode" placeholder="PIN">
            <button class="btn" onclick="login()">ログイン</button>
            <hr>
            <p>新規申請</p>
            <input type="text" id="regId" placeholder="希望ID">
            <input type="password" id="regPin" placeholder="希望PIN">
            <button class="btn" onclick="register()">申請</button>
        `;
    }

    async function login() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('pinCode').value;
        const snap = await db.collection("requests").where("userId", "==", id).get();
        if (snap.empty) return alert("ユーザーなし");
        const data = snap.docs[0].data();
        if (data.pin == pin && data.isApproved) {
            currentUserName = id;
            showThreadList();
        } else { alert("未承認またはPIN違い"); }
    }

    async function register() {
        const id = document.getElementById('regId').value;
        const pin = document.getElementById('regPin').value;
        await db.collection("requests").add({ userId: id, pin: pin, isApproved: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("申請完了");
    }

    // --- スレッド一覧画面 ---
    function showThreadList() {
        currentThreadId = null;
        document.getElementById('root').innerHTML = `
            <h1>ShoBBS - スレッド一覧</h1>
            <div class="nav-bar"><button class="btn" onclick="location.reload()">ログアウト</button></div>
            <div id="list-area">読み込み中...</div>
            <div class="form-area">
                <b>新規スレッド作成</b>
                <input type="text" id="newThreadTitle" placeholder="スレッドタイトル">
                <textarea id="firstPost" placeholder="最初の書き込み"></textarea>
                <button class="btn" onclick="createThread()">スレッドを立てる</button>
            </div>
        `;
        
        db.collection("threads").orderBy("createdAt", "desc").onSnapshot(ss => {
            const area = document.getElementById('list-area');
            if(!area || currentThreadId) return;
            area.innerHTML = "";
            ss.forEach(doc => {
                const t = doc.data();
                const div = document.createElement('div');
                div.className = "thread-item";
                div.innerText = `■ ${t.title}`;
                div.onclick = () => showThreadDetail(doc.id, t.title);
                area.appendChild(div);
            });
        });
    }

    // --- スレッド作成 ---
    async function createThread() {
        const title = document.getElementById('newThreadTitle').value;
        const text = document.getElementById('firstPost').value;
        if(!title || !text) return alert("全部入力して");

        const threadRef = await db.collection("threads").add({
            title: title,
            creator: currentUserName,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // 最初の1レス目も保存
        await db.collection("posts").add({
            threadId: threadRef.id,
            user: currentUserName,
            text: text,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        showThreadDetail(threadRef.id, title);
    }

    // --- スレッド詳細（レス一覧） ---
    function showThreadDetail(id, title) {
        currentThreadId = id;
        document.getElementById('root').innerHTML = `
            <div class="nav-bar"><button class="btn" onclick="showThreadList()">一覧に戻る</button></div>
            <h1>${title}</h1>
            <div id="post-area">読み込み中...</div>
            <div class="form-area">
                <b>レスを書く</b>
                <textarea id="replyText" rows="4"></textarea>
                <button class="btn" onclick="sendReply()">書き込む</button>
            </div>
        `;

        db.collection("posts").where("threadId", "==", id).orderBy("createdAt", "asc").onSnapshot(ss => {
            const area = document.getElementById('post-area');
            if(!area) return;
            area.innerHTML = "";
            let count = 1;
            ss.forEach(doc => {
                const p = doc.data();
                area.innerHTML += `
                    <div class="post">
                        <div class="post-info">${count} ：${p.user}</div>
                        <div class="post-body">${p.text}</div>
                    </div>
                `;
                count++;
            });
        });
    }

    async function sendReply() {
        const text = document.getElementById('replyText').value;
        if(!text.trim()) return;
        await db.collection("posts").add({
            threadId: currentThreadId,
            user: currentUserName,
            text: text,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('replyText').value = "";
    }
</script>
</body>
</html>
