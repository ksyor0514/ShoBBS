<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShoSNS</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.9);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --text: #e2e8f0;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 2px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--accent);
        }

        h1 { text-align: center; color: var(--accent); letter-spacing: 5px; margin: 0 0 20px 0; }

        .vc-panel {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--accent);
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .status-dot {
            display: inline-block; width: 10px; height: 10px;
            background: #334155; border-radius: 50%; margin-right: 8px;
        }

        input, textarea {
            width: 100%; padding: 12px; margin: 8px 0;
            background: rgba(0,0,0,0.7); color: var(--accent);
            border: 1px solid #1e293b; box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%; padding: 14px; background: transparent;
            color: var(--accent); border: 1px solid var(--accent);
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        button:hover { background: var(--accent); color: #000; }

        #timeline { margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .post-card { background: rgba(255, 255, 255, 0.03); padding: 12px; margin-top: 10px; border-left: 2px solid var(--accent); }
        .post-user { color: var(--accent); font-size: 0.7em; }
    </style>
</head>
<body>

<div id="main-container" class="container">
    <div id="content-area">
        <h1>ShoSNS</h1>
        <div id="auth-ui">
            <input type="text" id="loginId" placeholder="ユーザーID">
            <input type="password" id="pinCode" placeholder="PINコード">
            <button onclick="login()">ログイン</button>
            <button style="margin-top:20px; border-color:#334155; color:#475569;" onclick="requestAccess()">新規参加を申請</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@skyway-sdk/core/dist/skyway_core.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    const appId = "e78d2560-389d-4d0e-a981-5214050d87ca";
    const firebaseConfig = {
        apiKey: "AIzaSyD2-XU5R6upCUgSDJbDz7iSoEQCzrzusLk",
        authDomain: "t1s-sns.firebaseapp.com",
        projectId: "t1s-sns",
        storageBucket: "t1s-sns.appspot.com",
        messagingSenderId: "377338728077",
        appId: "1:377338728077:web:1205ed292e4181869adcc4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const { SkyWayContext, SkyWayRoom, SkyWayStreamFactory } = skyway_sdk_core;

    let currentUserName = "";

    async function login() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('pinCode').value;
        if(!id || !pin) return;
        const snapshot = await db.collection("requests").where("userId", "==", id).where("pin", "==", pin).get();
        if (snapshot.empty) return alert("認証失敗");
        const user = snapshot.docs[0].data();
        if (user.isApproved) {
            currentUserName = id;
            showMainPage(id);
        } else {
            alert("未承認です");
        }
    }

    function requestAccess() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('pinCode').value;
        if(!id || !pin) return alert("入力してください");
        db.collection("requests").add({ userId: id, pin: pin, isApproved: false, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        alert("申請完了");
    }

    function showMainPage(username) {
        document.getElementById('content-area').innerHTML = `
            <h1 style="font-size: 1.8em;">ShoSNS</h1>
            <div class="vc-panel">
                <div style="font-size:0.8em; margin-bottom:10px;">
                    <span id="vc-dot" class="status-dot"></span>ボイスチャンネル: Shoルーム
                </div>
                <button id="joinBtn" onclick="joinVC()">入室する</button>
            </div>
            <textarea id="postInput" placeholder="今なにしてる？"></textarea>
            <button onclick="sendPost('${username}')">投稿</button>
            <div id="timeline"></div>
            <button onclick="location.reload()" style="border:none; color:#475569; font-size:0.6em; margin-top:20px;">ログアウト</button>
        `;
        loadPosts();
    }

    async function joinVC() {
        const btn = document.getElementById('joinBtn');
        const dot = document.getElementById('vc-dot');
        btn.disabled = true;
        btn.innerText = "接続中...";
        try {
            const audioStream = await SkyWayStreamFactory.createMicrophoneAudioStream();
            const context = await SkyWayContext.Create(appId);
            const room = await SkyWayRoom.FindOrCreate(context, { type: 'p2p', name: 'ShoRoom' });
            const me = await room.join();
            await me.publish(audioStream);
            const subscribe = async (publication) => {
                if (publication.publisherId === me.id) return;
                const { stream } = await me.subscribe(publication.id);
                const audio = document.createElement('audio');
                audio.srcObject = stream.track;
                audio.autoplay = true;
                document.body.appendChild(audio);
            };
            room.onStreamPublished.add((e) => subscribe(e.publication));
            room.publications.forEach(subscribe);
            btn.innerText = "入室中 (マイクON)";
            btn.style.borderColor = "#00ff00";
            dot.style.background = "#00ff00";
        } catch (e) {
            console.error(e);
            alert("エラー: 通信に失敗しました。");
            btn.disabled = false;
            btn.innerText = "入室する";
        }
    }

    async function sendPost(username) {
        const text = document.getElementById('postInput').value;
        if(!text.trim()) return;
        await db.collection("posts").add({ user: username, text: text, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('postInput').value = "";
    }

    function loadPosts() {
        db.collection("posts").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                timeline.innerHTML += `<div class="post-card"><div class="post-user">${data.user}</div><div>${data.text}</div></div>`;
            });
        });
    }
</script>
</body>
</html>
