<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShoBBS</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #eee; --text: #000; --link: #0000ff; --border: #ccc; }
        body { background: var(--bg); font-family: "MS PGothic", "IPAMonaPGothic", sans-serif; font-size: 16px; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; border: 2px solid var(--border); padding: 15px; }
        h1 { color: #ff0000; font-size: 1.5em; text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        /* 2ch風スレッドスタイル */
        .thread-header { background: #efefef; padding: 10px; border: 1px solid var(--border); margin-bottom: 20px; }
        .post { border-bottom: 1px dashed var(--border); padding: 10px 0; }
        .post-info { color: #228b22; font-weight: bold; font-size: 0.9em; }
        .post-num { color: var(--link); margin-right: 5px; }
        .post-body { margin-top: 5px; white-space: pre-wrap; line-height: 1.4; }
        
        input, textarea { width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 8px; border: 1px solid var(--border); }
        button { background: #f0f0f0; border: 1px solid #999; padding: 5px 15px; cursor: pointer; }
        
        .vc-badge { font-size: 0.7em; background: #333; color: #fff; padding: 2px 5px; border-radius: 3px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div id="root" class="container">
    <div id="auth-box">
        <h1>ShoBBS - ログイン</h1>
        <input type="text" id="loginId" placeholder="ID">
        <input type="password" id="pinCode" placeholder="PIN">
        <button onclick="login()">ログイン</button>
        <hr>
        <p style="font-size:0.8em;">新規登録（申請）</p>
        <input type="text" id="regId" placeholder="希望ID">
        <input type="password" id="regPin" placeholder="希望PIN">
        <button onclick="register()">申請</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@skyway-sdk/core/dist/skyway_core.js"></script>

<script>
    let currentUserName = "";
    let db, SkyWayContext, SkyWayRoom, SkyWayStreamFactory;

    const appId = "e78d2560-389d-4d0e-a981-5214050d87ca";
    const firebaseConfig = {
        apiKey: "AIzaSyD2-XU5R6upCUgSDJbDz7iSoEQCzrzusLk",
        authDomain: "t1s-sns.firebaseapp.com",
        projectId: "t1s-sns",
        storageBucket: "t1s-sns.appspot.com",
        messagingSenderId: "377338728077",
        appId: "1:377338728077:web:1205ed292e4181869adcc4"
    };

    window.onload = () => {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        setTimeout(() => {
            if (window.skyway_sdk_core) {
                SkyWayContext = skyway_sdk_core.SkyWayContext;
                SkyWayRoom = skyway_sdk_core.SkyWayRoom;
                SkyWayStreamFactory = skyway_sdk_core.SkyWayStreamFactory;
            }
        }, 1000);
    };

    async function register() {
        const id = document.getElementById('regId').value;
        const pin = document.getElementById('regPin').value;
        if(!id || !pin) return alert("入力して");
        await db.collection("requests").add({ userId: id, pin: pin, isApproved: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("申請完了。管理者がFirestoreでisApprovedをtrueにするまで待ってね。");
    }

    async function login() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('pinCode').value;
        const snap = await db.collection("requests").where("userId", "==", id).get();
        if (snap.empty) return alert("ユーザーなし");
        const data = snap.docs[0].data();
        if (data.pin == pin && data.isApproved) {
            currentUserName = id;
            showMainPage();
        } else { alert("未承認またはPIN違い"); }
    }

    function showMainPage() {
        document.getElementById('root').innerHTML = `
            <div class="vc-badge" id="vcBtn" onclick="joinVC()">ボイスチャット開始</div>
            <h1>ShoBBS: 雑談スレッド</h1>
            <div id="thread-area"></div>
            <div class="thread-header" style="margin-top:20px;">
                <b>レスを書き込む</b><br>
                <textarea id="postInput" rows="4" placeholder="内容を入力してください"></textarea>
                <button onclick="sendPost()">書き込む</button>
                <button onclick="location.reload()">ログアウト</button>
            </div>
        `;
        loadPosts();
    }

    async function sendPost() {
        const input = document.getElementById('postInput');
        if(!input.value.trim()) return;
        await db.collection("posts").add({
            user: currentUserName,
            text: input.value,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    }

    function loadPosts() {
        db.collection("posts").orderBy("createdAt", "asc").onSnapshot(ss => {
            const area = document.getElementById('thread-area');
            if(!area) return;
            area.innerHTML = "";
            let count = 1;
            ss.forEach(doc => {
                const p = doc.data();
                const time = p.createdAt ? new Date(p.createdAt.seconds * 1000).toLocaleString() : "";
                area.innerHTML += `
                    <div class="post">
                        <div class="post-info">
                            <span class="post-num">${count}</span>
                            名前：${p.user} ：${time}
                        </div>
                        <div class="post-body">${p.text}</div>
                    </div>
                `;
                count++;
            });
        });
    }

    async function joinVC() {
        if(!SkyWayContext) return alert("SkyWay読み込み中...もう一度押して");
        const btn = document.getElementById('vcBtn');
        btn.innerText = "接続中...";
        try {
            const context = await SkyWayContext.Create(appId);
            const room = await SkyWayRoom.FindOrCreate(context, { type: 'p2p', name: 'ShoRoom' });
            const stream = await SkyWayStreamFactory.createMicrophoneAudioStream();
            const me = await room.join();
            await me.publish(stream);
            room.onStreamPublished.add(async (e) => {
                if (e.publication.publisherId === me.id) return;
                const { stream: remoteStream } = await me.subscribe(e.publication.id);
                const audio = document.createElement('audio');
                audio.srcObject = remoteStream.track;
                audio.autoplay = true;
                document.body.appendChild(audio);
            });
            btn.innerText = "ボイチャ中 (ON)";
            btn.style.background = "#ff0000";
        } catch (e) {
            alert("ボイチャ失敗: " + e.message);
            btn.innerText = "ボイチャ失敗 (リトライ)";
        }
    }
</script>
</body>
</html>
